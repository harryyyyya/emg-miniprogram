services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: emg-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - ./backend/uploads:/app/uploads
    expose:
      - "8000"

  caddy:
    build:
      context: .
      dockerfile: ./web/Dockerfile
    container_name: emg-caddy
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      API_DOMAIN: ${API_DOMAIN}
      WEB_DOMAIN: ${WEB_DOMAIN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  caddy_data:
  caddy_config:
